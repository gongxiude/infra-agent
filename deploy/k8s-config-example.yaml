# K8s 部署参考配置
# 通过 ConfigMap 注入环境变量

apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-agent-config
data:
  AGENT_GIT_WORKSPACE_ROOT: "/workspace"
  AGENT_GIT_REMOTE_REPOSITORIES: |
    {"jenkins-pipeline":"git@codeup.aliyun.com:6316fd51cb9d00684879aa3a/devops/jenkins-pipeline.git"}

---
# Secret 存放敏感信息
apiVersion: v1
kind: Secret
metadata:
  name: infra-agent-secrets
type: Opaque
stringData:
  INFRA_AGENT_OPENAI_API_KEY: "sk-xxx"
  # SSH key for git clone (挂载到 /root/.ssh/id_rsa)
